<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quản lý & Thu hồi quyền TKQC</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    /* ── Reset ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Be Vietnam Pro', sans-serif; background: #f0f4f8; color: #0f172a; }
    :root {
      --accent: #22c55e; --accent-dark: #16a34a;
      --border: #e2e8f0; --bg: #ffffff;
      --text-primary: #0f172a; --text-secondary: #64748b; --text-muted: #94a3b8;
      --danger: #ef4444; --danger-light: #fef2f2; --danger-border: #fecaca;
      --blue: #3b82f6; --blue-light: #dbeafe;
      --sidebar-w: 300px;
    }
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }

    /* ── Layout ── */
    .app-shell { display: flex; height: 100vh; overflow: hidden; }

    /* ── Sidebar ── */
    .via-panel {
      width: var(--sidebar-w); flex-shrink: 0;
      background: var(--bg); border-right: 1px solid var(--border);
      display: flex; flex-direction: column; overflow: hidden;
    }
    .via-panel-header {
      padding: 16px 16px 0; flex-shrink: 0;
    }
    .via-panel-title {
      display: flex; align-items: center; gap: 8px;
      font-size: 15px; font-weight: 700; color: var(--text-primary);
      margin-bottom: 12px;
    }
    .via-panel-title .count-badge {
      background: var(--blue-light); color: var(--blue);
      font-size: 11px; font-weight: 600; padding: 2px 8px;
      border-radius: 10px;
    }
    .via-search {
      width: 100%; padding: 8px 12px;
      border: 1px solid var(--border); border-radius: 8px;
      font-size: 13px; font-family: inherit;
      outline: none; transition: border .15s;
      margin-bottom: 12px;
    }
    .via-search:focus { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(34,197,94,.12); }

    .via-list { flex: 1; overflow-y: auto; padding: 0 8px 8px; }

    .via-card {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 12px; border-radius: 10px; cursor: pointer;
      transition: all .15s; border-left: 3px solid transparent;
      margin-bottom: 2px; position: relative;
    }
    .via-card:hover { background: #f8fafc; border-left-color: #cbd5e1; }
    .via-card.selected { background: #f0fdf4; border-left-color: var(--accent); }
    .via-card .avatar {
      width: 38px; height: 38px; border-radius: 50%; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 13px; color: white;
    }
    .via-card .via-info { flex: 1; min-width: 0; }
    .via-card .via-name {
      font-size: 13.5px; font-weight: 600; color: var(--text-primary);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .via-card .via-uid {
      font-size: 11px; color: var(--text-muted);
      font-family: 'JetBrains Mono', monospace;
    }
    .via-card .tkqc-count {
      font-size: 11px; font-weight: 600; padding: 2px 8px;
      border-radius: 10px; flex-shrink: 0;
      background: var(--blue-light); color: var(--blue);
    }
    .via-card .tkqc-count.zero { background: #f1f5f9; color: var(--text-muted); }

    /* ── Main panel ── */
    .main-panel { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

    .main-header {
      padding: 16px 24px; background: var(--bg);
      border-bottom: 1px solid var(--border); flex-shrink: 0;
      display: flex; align-items: center; gap: 12px;
    }
    .main-header h2 { font-size: 18px; font-weight: 700; }
    .main-header .uid-tag {
      font-size: 11px; font-family: 'JetBrains Mono', monospace;
      color: var(--text-muted); background: #f1f5f9;
      padding: 2px 8px; border-radius: 4px;
    }
    .main-header .spacer { flex: 1; }
    .main-header .updated-at { font-size: 11.5px; color: var(--text-muted); margin-right: 8px; }

    .main-content { flex: 1; overflow-y: auto; padding: 20px 24px; }

    /* ── Buttons ── */
    .btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 7px 14px; border-radius: 8px;
      font-size: 13px; font-weight: 500; cursor: pointer;
      transition: all .15s; border: none; font-family: inherit;
      white-space: nowrap;
    }
    .btn-ghost { background: transparent; color: var(--text-secondary); border: 1px solid var(--border); }
    .btn-ghost:hover { background: #f8fafc; }
    .btn-accent { background: var(--accent); color: white; }
    .btn-accent:hover { background: var(--accent-dark); }
    .btn-danger-solid { background: var(--danger); color: white; }
    .btn-danger-solid:hover { background: #dc2626; }
    .btn-danger-outline {
      background: var(--danger-light); color: var(--danger);
      border: 1px solid var(--danger-border);
    }
    .btn-danger-outline:hover { background: #fee2e2; }
    .btn:disabled { opacity: .5; cursor: not-allowed; }
    .btn-sm { padding: 4px 10px; font-size: 12px; border-radius: 6px; }

    /* ── Accordion ── */
    .accordion { margin-bottom: 12px; border: 1px solid var(--border); border-radius: 12px; background: var(--bg); overflow: hidden; }
    .accordion-header {
      display: flex; align-items: center; gap: 10px;
      padding: 12px 16px; cursor: pointer;
      transition: background .12s; user-select: none;
    }
    .accordion-header:hover { background: #fafbfc; }
    .accordion-icon {
      width: 28px; height: 28px; border-radius: 7px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .accordion-icon.bm { background: var(--blue-light); color: var(--blue); }
    .accordion-icon.personal { background: #fef3c7; color: #d97706; }
    .accordion-title { font-weight: 600; font-size: 14px; color: var(--text-primary); }
    .accordion-bmid { font-size: 11px; color: var(--text-muted); font-family: 'JetBrains Mono', monospace; }
    .accordion-count {
      font-size: 11px; font-weight: 600; padding: 2px 8px;
      border-radius: 10px; background: #f1f5f9; color: var(--text-secondary);
    }
    .accordion-spacer { flex: 1; }
    .accordion-check { margin-right: 4px; }
    .accordion-chevron {
      width: 20px; height: 20px; transition: transform .2s;
      color: var(--text-muted); flex-shrink: 0;
    }
    .accordion-chevron.open { transform: rotate(180deg); }
    .accordion-body { border-top: 1px solid var(--border); }

    /* ── Table ── */
    .rel-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .rel-table th {
      text-align: left; padding: 9px 12px;
      background: #f8fafc; color: var(--text-secondary);
      font-weight: 600; font-size: 12px; white-space: nowrap;
      border-bottom: 1px solid var(--border);
    }
    .rel-table td {
      padding: 10px 12px; border-bottom: 1px solid #f1f5f9;
      vertical-align: middle;
    }
    .rel-table tbody tr:hover td { background: #fafffe; }
    .rel-table tbody tr:last-child td { border-bottom: none; }

    .mono { font-family: 'JetBrains Mono', monospace; font-size: 11px; }
    .copy-btn {
      width: 20px; height: 20px; border-radius: 4px;
      display: inline-flex; align-items: center; justify-content: center;
      background: transparent; border: 1px solid var(--border);
      cursor: pointer; color: var(--text-muted); transition: all .12s;
      vertical-align: middle; margin-left: 4px;
    }
    .copy-btn:hover { background: #f1f5f9; color: var(--text-primary); }

    /* ── Permission badges ── */
    .perm-badge {
      display: inline-flex; padding: 2px 8px; border-radius: 4px;
      font-size: 10.5px; font-weight: 600; margin-right: 3px;
      font-family: 'JetBrains Mono', monospace;
    }
    .perm-MANAGE { background: #ffedd5; color: #c2410c; }
    .perm-ADVERTISE { background: var(--blue-light); color: var(--blue); }
    .perm-ANALYZE { background: #f1f5f9; color: #475569; }
    .perm-DRAFT { background: #ede9fe; color: #7c3aed; }

    /* ── Status ── */
    .status-badge {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 3px 10px; border-radius: 20px;
      font-size: 12px; font-weight: 500;
    }
    .status-active { background: #dcfce7; color: #16a34a; }
    .status-disabled { background: #fee2e2; color: #dc2626; }

    /* ── Bulk bar ── */
    .bulk-bar {
      position: sticky; bottom: 0; left: 0; right: 0;
      background: #1e293b; color: white;
      padding: 12px 24px; display: flex; align-items: center; gap: 12px;
      box-shadow: 0 -4px 20px rgba(0,0,0,.15);
      animation: slideUp .2s ease;
    }
    @keyframes slideUp { from { transform: translateY(100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    .bulk-bar .bulk-count { font-size: 13px; font-weight: 500; flex: 1; }
    .bulk-bar .btn-danger-solid { background: #ef4444; }
    .bulk-bar .btn-ghost { color: #94a3b8; border-color: #475569; }
    .bulk-bar .btn-ghost:hover { color: white; background: #334155; }

    /* ── Modal ── */
    .modal-backdrop {
      position: fixed; inset: 0; background: rgba(0,0,0,.45);
      display: flex; align-items: center; justify-content: center;
      z-index: 1000; animation: fadeIn .15s;
    }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .modal-box {
      background: white; border-radius: 14px; width: 420px; max-width: 90vw;
      box-shadow: 0 20px 60px rgba(0,0,0,.2); overflow: hidden;
      animation: scaleIn .2s ease;
    }
    @keyframes scaleIn { from { transform: scale(.95); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    .modal-body { padding: 24px; }
    .modal-icon {
      width: 48px; height: 48px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 14px;
    }
    .modal-icon.danger { background: #fee2e2; color: #ef4444; }
    .modal-title { font-size: 16px; font-weight: 700; text-align: center; margin-bottom: 8px; }
    .modal-desc { font-size: 13.5px; color: var(--text-secondary); text-align: center; line-height: 1.6; }
    .modal-desc strong { color: var(--text-primary); }
    .modal-warn {
      margin-top: 12px; padding: 8px 12px; border-radius: 8px;
      background: #fef3c7; font-size: 12px; color: #92400e;
      display: flex; align-items: center; gap: 6px;
    }
    .modal-footer {
      padding: 12px 24px; background: #fafbfc;
      border-top: 1px solid var(--border);
      display: flex; justify-content: flex-end; gap: 8px;
    }

    /* ── Empty state ── */
    .empty-state {
      text-align: center; padding: 60px 20px; color: var(--text-muted);
    }
    .empty-state svg { opacity: .3; margin-bottom: 12px; }
    .empty-state p { font-size: 14px; }

    /* ── Spinner ── */
    .spinner {
      width: 14px; height: 14px; border: 2px solid rgba(255,255,255,.3);
      border-top-color: white; border-radius: 50%;
      animation: spin .6s linear infinite;
    }
    .spinner.dark { border-color: rgba(0,0,0,.1); border-top-color: var(--text-secondary); }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Responsive ── */
    @media (max-width: 768px) {
      :root { --sidebar-w: 100%; }
      .app-shell { flex-direction: column; }
      .via-panel { width: 100%; height: auto; max-height: 220px; border-right: none; border-bottom: 1px solid var(--border); }
      .via-list { display: flex; gap: 6px; overflow-x: auto; overflow-y: hidden; padding: 0 8px 8px; flex-wrap: nowrap; }
      .via-card { min-width: 180px; flex-shrink: 0; margin-bottom: 0; }
      .main-header { padding: 12px 16px; flex-wrap: wrap; }
      .main-content { padding: 12px 16px; }
      .accordion-header { padding: 10px 12px; gap: 8px; }
      .accordion-bmid { display: none; }
      .rel-table th, .rel-table td { padding: 8px 8px; }
      .bulk-bar { padding: 10px 16px; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useMemo, useCallback } = React;

    // ── Mock Data ──
    const COLORS = ['#22c55e','#3b82f6','#f59e0b','#ef4444','#8b5cf6','#06b6d4','#ec4899','#14b8a6','#f97316','#6366f1'];
    const getColor = (name) => COLORS[name.charCodeAt(0) % COLORS.length];
    const getInitials = (name) => name.split(' ').slice(0,2).map(w=>w[0]).join('').toUpperCase();

    const mockVIAs = [
      { id:"v1", name:"Nguyen Van A",  uid:"100012345678", tkqcCount:8 },
      { id:"v2", name:"Tran Thi B",    uid:"100087654321", tkqcCount:3 },
      { id:"v3", name:"Le Van C",      uid:"100011223344", tkqcCount:12 },
      { id:"v4", name:"Pham Thi D",    uid:"100099887766", tkqcCount:0 },
      { id:"v5", name:"Hoang Minh E",  uid:"100055667788", tkqcCount:5 },
    ];

    const mockRelations = {
      v1: [
        { groupId:"personal", groupName:"TKQC cá nhân ngoài BM", groupBmId:null, accounts:[
          { actId:"9912001", name:"TKQC Cá nhân 01", tasks:["ADVERTISE","ANALYZE"], status:1 },
          { actId:"9912002", name:"TKQC Cá nhân 02", tasks:["MANAGE","ADVERTISE","ANALYZE"], status:2 },
        ]},
        { groupId:"bm1", groupName:"Agency Alpha", groupBmId:"823041001", accounts:[
          { actId:"9913001", name:"TKQC VN 01", tasks:["ADVERTISE","ANALYZE"], status:1 },
          { actId:"9913002", name:"TKQC VN 02", tasks:["ANALYZE"], status:1 },
          { actId:"9913003", name:"TKQC VN 03", tasks:["ADVERTISE","ANALYZE"], status:1 },
        ]},
        { groupId:"bm2", groupName:"Client Beta", groupBmId:"823041002", accounts:[
          { actId:"9914001", name:"TKQC Beta 01", tasks:["MANAGE","ADVERTISE","ANALYZE"], status:1 },
          { actId:"9914002", name:"TKQC Beta 02", tasks:["ADVERTISE","ANALYZE"], status:1 },
          { actId:"9914003", name:"TKQC Beta 03", tasks:["DRAFT"], status:2 },
        ]},
      ],
      v2: [
        { groupId:"bm3", groupName:"Agency Gamma", groupBmId:"823041003", accounts:[
          { actId:"9915001", name:"TKQC Gamma 01", tasks:["ADVERTISE","ANALYZE"], status:1 },
          { actId:"9915002", name:"TKQC Gamma 02", tasks:["ANALYZE"], status:1 },
          { actId:"9915003", name:"TKQC Gamma 03", tasks:["MANAGE","ADVERTISE","ANALYZE"], status:1 },
        ]},
      ],
      v3: [
        { groupId:"bm1", groupName:"Agency Alpha", groupBmId:"823041001", accounts:[
          { actId:"9916001", name:"TKQC Alpha X1", tasks:["ADVERTISE","ANALYZE"], status:1 },
          { actId:"9916002", name:"TKQC Alpha X2", tasks:["ADVERTISE","ANALYZE"], status:1 },
          { actId:"9916003", name:"TKQC Alpha X3", tasks:["ANALYZE"], status:1 },
          { actId:"9916004", name:"TKQC Alpha X4", tasks:["MANAGE","ADVERTISE","ANALYZE"], status:1 },
          { actId:"9916005", name:"TKQC Alpha X5", tasks:["ADVERTISE","ANALYZE"], status:2 },
        ]},
        { groupId:"bm4", groupName:"Delta Corp", groupBmId:"823041004", accounts:[
          { actId:"9917001", name:"TKQC Delta 01", tasks:["ADVERTISE","ANALYZE"], status:1 },
          { actId:"9917002", name:"TKQC Delta 02", tasks:["MANAGE","ADVERTISE","ANALYZE"], status:1 },
          { actId:"9917003", name:"TKQC Delta 03", tasks:["ADVERTISE","ANALYZE"], status:1 },
          { actId:"9917004", name:"TKQC Delta 04", tasks:["DRAFT"], status:1 },
        ]},
        { groupId:"personal", groupName:"TKQC cá nhân ngoài BM", groupBmId:null, accounts:[
          { actId:"9918001", name:"TKQC Personal C1", tasks:["ADVERTISE","ANALYZE"], status:1 },
          { actId:"9918002", name:"TKQC Personal C2", tasks:["ANALYZE"], status:1 },
          { actId:"9918003", name:"TKQC Personal C3", tasks:["ADVERTISE","ANALYZE"], status:2 },
        ]},
      ],
      v5: [
        { groupId:"bm5", groupName:"Epsilon Agency", groupBmId:"823041005", accounts:[
          { actId:"9919001", name:"TKQC Eps 01", tasks:["ADVERTISE","ANALYZE"], status:1 },
          { actId:"9919002", name:"TKQC Eps 02", tasks:["MANAGE","ADVERTISE","ANALYZE"], status:1 },
          { actId:"9919003", name:"TKQC Eps 03", tasks:["ADVERTISE","ANALYZE"], status:1 },
          { actId:"9919004", name:"TKQC Eps 04", tasks:["ANALYZE"], status:1 },
          { actId:"9919005", name:"TKQC Eps 05", tasks:["DRAFT"], status:2 },
        ]},
      ],
    };

    // ── SVG Icons as components ──
    const IconChevron = ({className}) => (
      <svg className={className} width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><polyline points="6 9 12 15 18 9"/></svg>
    );
    const IconRefresh = () => (
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 102.13-9.36L1 10"/></svg>
    );
    const IconFolder = () => (
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 21V5a2 2 0 00-2-2h-4a2 2 0 00-2 2v16"/></svg>
    );
    const IconUser = () => (
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="8" r="4"/><path d="M20 21a8 8 0 10-16 0"/></svg>
    );
    const IconCopy = () => (
      <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
    );
    const IconWarn = () => (
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
    );
    const IconBan = () => (
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="10"/><line x1="4.93" y1="4.93" x2="19.07" y2="19.07"/></svg>
    );
    const IconSearch = () => (
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    );

    // ── Confirm Dialog ──
    function ConfirmDialog({ open, title, desc, items, onConfirm, onCancel, loading }) {
      if (!open) return null;
      return (
        <div className="modal-backdrop" onClick={onCancel}>
          <div className="modal-box" onClick={e => e.stopPropagation()}>
            <div className="modal-body">
              <div className="modal-icon danger"><IconBan /></div>
              <div className="modal-title">{title}</div>
              <div className="modal-desc" dangerouslySetInnerHTML={{__html: desc}} />
              {items && items.length > 0 && (
                <div style={{marginTop:10, maxHeight:120, overflowY:'auto', background:'#f8fafc', borderRadius:8, padding:'8px 12px', border:'1px solid var(--border)'}}>
                  {items.map((it, i) => (
                    <div key={i} style={{fontSize:12, color:'#475569', padding:'2px 0'}}>
                      <span className="mono" style={{color:'#3b82f6'}}>act_{it.actId}</span> — {it.name}
                    </div>
                  ))}
                </div>
              )}
              <div className="modal-warn">
                <IconWarn />
                Thao tác này không thể hoàn tác.
              </div>
            </div>
            <div className="modal-footer">
              <button className="btn btn-ghost" onClick={onCancel} disabled={loading}>Hủy</button>
              <button className="btn btn-danger-solid" onClick={onConfirm} disabled={loading}>
                {loading ? <><div className="spinner" /> Đang xử lý...</> : 'Xác nhận thu hồi'}
              </button>
            </div>
          </div>
        </div>
      );
    }

    // ── Permission Badge ──
    function PermBadge({ task }) {
      return <span className={`perm-badge perm-${task}`}>{task}</span>;
    }

    // ── Accordion Group ──
    function AccordionGroup({ group, selected, onToggleSelect, onToggleSelectAll, onRevokeSingle }) {
      const [open, setOpen] = useState(true);
      const isPersonal = !group.groupBmId;
      const allChecked = group.accounts.every(a => selected.has(a.actId));
      const someChecked = group.accounts.some(a => selected.has(a.actId));

      return (
        <div className="accordion">
          <div className="accordion-header" onClick={() => setOpen(!open)}>
            <div className={`accordion-icon ${isPersonal ? 'personal' : 'bm'}`}>
              {isPersonal ? <IconUser /> : <IconFolder />}
            </div>
            <div>
              <div className="accordion-title">{group.groupName}</div>
              {group.groupBmId && <div className="accordion-bmid">ID: {group.groupBmId}</div>}
            </div>
            <div className="accordion-spacer" />
            <div className="accordion-count">{group.accounts.length} TKQC</div>
            <label className="accordion-check" onClick={e => e.stopPropagation()}>
              <input
                type="checkbox"
                checked={allChecked}
                ref={el => { if (el) el.indeterminate = someChecked && !allChecked; }}
                onChange={() => onToggleSelectAll(group)}
                style={{width:15, height:15, accentColor:'var(--accent)', cursor:'pointer'}}
              />
            </label>
            <IconChevron className={`accordion-chevron ${open ? 'open' : ''}`} />
          </div>
          {open && (
            <div className="accordion-body">
              <table className="rel-table">
                <thead>
                  <tr>
                    <th style={{width:38, textAlign:'center'}}></th>
                    <th style={{minWidth:130}}>TKQC ID</th>
                    <th style={{minWidth:150}}>Tên TKQC</th>
                    <th style={{minWidth:160}}>Quyền</th>
                    <th style={{minWidth:85}}>Trạng thái</th>
                    <th style={{width:90, textAlign:'center'}}>Thao tác</th>
                  </tr>
                </thead>
                <tbody>
                  {group.accounts.map(acc => (
                    <tr key={acc.actId}>
                      <td style={{textAlign:'center'}}>
                        <input
                          type="checkbox"
                          checked={selected.has(acc.actId)}
                          onChange={() => onToggleSelect(acc.actId)}
                          style={{width:14, height:14, accentColor:'var(--accent)', cursor:'pointer'}}
                        />
                      </td>
                      <td>
                        <span className="mono" style={{color:'#3b82f6', fontSize:12}}>act_{acc.actId}</span>
                        <button className="copy-btn" title="Copy ID" onClick={() => navigator.clipboard?.writeText(`act_${acc.actId}`)}>
                          <IconCopy />
                        </button>
                      </td>
                      <td style={{fontWeight:500, fontSize:13}}>{acc.name}</td>
                      <td>
                        {acc.tasks.map(t => <PermBadge key={t} task={t} />)}
                      </td>
                      <td>
                        <span className={`status-badge ${acc.status === 1 ? 'status-active' : 'status-disabled'}`}>
                          {acc.status === 1 ? 'Active' : 'Disabled'}
                        </span>
                      </td>
                      <td style={{textAlign:'center'}}>
                        <button
                          className="btn btn-danger-outline btn-sm"
                          onClick={() => onRevokeSingle(acc, group)}
                        >
                          {isPersonal ? 'Thu hồi VIA' : 'Thu hồi BM'}
                        </button>
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          )}
        </div>
      );
    }

    // ── Main App ──
    function App() {
      const [selectedVia, setSelectedVia] = useState(null);
      const [viaSearch, setViaSearch] = useState('');
      const [selected, setSelected] = useState(new Set());
      const [confirmOpen, setConfirmOpen] = useState(false);
      const [confirmData, setConfirmData] = useState({ title:'', desc:'', items:[] });
      const [confirmLoading, setConfirmLoading] = useState(false);
      const [refreshing, setRefreshing] = useState(false);
      const [removedIds, setRemovedIds] = useState(new Set());

      const filteredVias = useMemo(() => {
        const q = viaSearch.toLowerCase();
        return mockVIAs.filter(v => !q || v.name.toLowerCase().includes(q) || v.uid.includes(q));
      }, [viaSearch]);

      const relations = useMemo(() => {
        if (!selectedVia) return [];
        const raw = mockRelations[selectedVia.id] || [];
        // Filter out removed
        return raw.map(g => ({
          ...g,
          accounts: g.accounts.filter(a => !removedIds.has(a.actId))
        })).filter(g => g.accounts.length > 0);
      }, [selectedVia, removedIds]);

      const totalTkqc = useMemo(() => relations.reduce((s,g) => s + g.accounts.length, 0), [relations]);

      const toggleSelect = useCallback((actId) => {
        setSelected(prev => {
          const next = new Set(prev);
          next.has(actId) ? next.delete(actId) : next.add(actId);
          return next;
        });
      }, []);

      const toggleSelectAll = useCallback((group) => {
        setSelected(prev => {
          const next = new Set(prev);
          const allIn = group.accounts.every(a => next.has(a.actId));
          group.accounts.forEach(a => allIn ? next.delete(a.actId) : next.add(a.actId));
          return next;
        });
      }, []);

      const clearSelection = useCallback(() => setSelected(new Set()), []);

      // Single revoke
      const handleRevokeSingle = useCallback((acc, group) => {
        const isPersonal = !group.groupBmId;
        const type = isPersonal ? 'VIA' : 'BM';
        const targetName = isPersonal ? selectedVia.name : group.groupName;
        setConfirmData({
          title: `Xác nhận thu hồi quyền`,
          desc: isPersonal
            ? `Thu hồi quyền <strong>${selectedVia.name}</strong> trên TKQC <strong>${acc.name}</strong>?<br/>VIA đó sẽ không còn quyền <strong>${acc.tasks.join(', ')}</strong> trên tài khoản này.`
            : `Thu hồi quyền BM <strong>${group.groupName}</strong> trên TKQC <strong>${acc.name}</strong>?<br/>BM đó sẽ mất toàn bộ quyền truy cập TKQC này ngay lập tức.`,
          items: [],
          actIds: [acc.actId],
        });
        setConfirmOpen(true);
      }, [selectedVia]);

      // Bulk revoke
      const handleBulkRevoke = useCallback(() => {
        const items = [];
        relations.forEach(g => g.accounts.forEach(a => {
          if (selected.has(a.actId)) items.push(a);
        }));
        setConfirmData({
          title: 'Xác nhận thu hồi hàng loạt',
          desc: `Thu hồi quyền <strong>${selectedVia.name}</strong> trên <strong>${items.length} TKQC</strong> đã chọn?`,
          items,
          actIds: items.map(i => i.actId),
        });
        setConfirmOpen(true);
      }, [selected, relations, selectedVia]);

      // Execute revoke (simulate)
      const executeRevoke = useCallback(() => {
        setConfirmLoading(true);
        setTimeout(() => {
          setRemovedIds(prev => {
            const next = new Set(prev);
            confirmData.actIds.forEach(id => next.add(id));
            return next;
          });
          setSelected(prev => {
            const next = new Set(prev);
            confirmData.actIds.forEach(id => next.delete(id));
            return next;
          });
          setConfirmLoading(false);
          setConfirmOpen(false);
        }, 1200);
      }, [confirmData]);

      // Refresh
      const handleRefresh = () => {
        setRefreshing(true);
        setTimeout(() => setRefreshing(false), 1500);
      };

      const now = new Date();
      const timeStr = `${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')} ${now.getDate().toString().padStart(2,'0')}/${(now.getMonth()+1).toString().padStart(2,'0')}/${now.getFullYear()}`;

      return (
        <div className="app-shell">
          {/* ═══ LEFT: VIA Panel ═══ */}
          <div className="via-panel">
            <div className="via-panel-header">
              <div className="via-panel-title">
                <IconUser />
                Danh sách VIA
                <span className="count-badge">{mockVIAs.length}</span>
              </div>
              <input
                className="via-search"
                placeholder="Tìm VIA..."
                value={viaSearch}
                onChange={e => setViaSearch(e.target.value)}
              />
            </div>
            <div className="via-list">
              {filteredVias.map(via => (
                <div
                  key={via.id}
                  className={`via-card ${selectedVia?.id === via.id ? 'selected' : ''}`}
                  onClick={() => { setSelectedVia(via); setSelected(new Set()); }}
                >
                  <div className="avatar" style={{background: getColor(via.name)}}>{getInitials(via.name)}</div>
                  <div className="via-info">
                    <div className="via-name">{via.name}</div>
                    <div className="via-uid">UID: {via.uid}</div>
                  </div>
                  <div className={`tkqc-count ${via.tkqcCount === 0 ? 'zero' : ''}`}>{via.tkqcCount}</div>
                </div>
              ))}
            </div>
          </div>

          {/* ═══ RIGHT: Main Panel ═══ */}
          <div className="main-panel">
            {!selectedVia ? (
              <div className="empty-state" style={{margin:'auto'}}>
                <svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5"><circle cx="12" cy="8" r="4"/><path d="M20 21a8 8 0 10-16 0"/></svg>
                <p>Chọn một VIA từ danh sách bên trái<br/>để xem và quản lý quyền TKQC</p>
              </div>
            ) : (
              <>
                {/* Header */}
                <div className="main-header">
                  <div className="avatar" style={{background:getColor(selectedVia.name), width:36, height:36, borderRadius:'50%', display:'flex', alignItems:'center', justifyContent:'center', color:'white', fontWeight:700, fontSize:13, flexShrink:0}}>
                    {getInitials(selectedVia.name)}
                  </div>
                  <div>
                    <h2>{selectedVia.name}</h2>
                    <span className="uid-tag">UID: {selectedVia.uid}</span>
                  </div>
                  <div className="spacer" />
                  <span className="updated-at">Cập nhật lúc: {timeStr}</span>
                  <button className="btn btn-ghost" onClick={handleRefresh} disabled={refreshing}>
                    {refreshing ? <div className="spinner dark" /> : <IconRefresh />}
                    {refreshing ? 'Đang tải...' : 'Refresh'}
                  </button>
                </div>

                {/* Content */}
                <div className="main-content">
                  {relations.length === 0 ? (
                    <div className="empty-state">
                      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5"><rect x="1" y="4" width="22" height="16" rx="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg>
                      <p>VIA này chưa có quyền trên TKQC nào<br/>hoặc tất cả đã được thu hồi.</p>
                    </div>
                  ) : (
                    <>
                      <div style={{display:'flex', alignItems:'center', gap:8, marginBottom:14}}>
                        <div style={{fontSize:14, fontWeight:700, color:'var(--text-primary)'}}>
                          Quan hệ quyền
                        </div>
                        <span style={{fontSize:12, color:'var(--text-muted)'}}>
                          {totalTkqc} TKQC trong {relations.length} nhóm
                        </span>
                      </div>
                      {relations.map(group => (
                        <AccordionGroup
                          key={group.groupId}
                          group={group}
                          selected={selected}
                          onToggleSelect={toggleSelect}
                          onToggleSelectAll={toggleSelectAll}
                          onRevokeSingle={handleRevokeSingle}
                        />
                      ))}
                    </>
                  )}
                </div>

                {/* Bulk bar */}
                {selected.size > 0 && (
                  <div className="bulk-bar">
                    <div className="bulk-count">Đã chọn <strong>{selected.size}</strong> quan hệ</div>
                    <button className="btn btn-ghost" onClick={clearSelection}>Bỏ chọn tất cả</button>
                    <button className="btn btn-danger-solid" onClick={handleBulkRevoke}>
                      <IconBan /> Thu hồi đã chọn ({selected.size})
                    </button>
                  </div>
                )}
              </>
            )}
          </div>

          {/* Confirm Dialog */}
          <ConfirmDialog
            open={confirmOpen}
            title={confirmData.title}
            desc={confirmData.desc}
            items={confirmData.items}
            loading={confirmLoading}
            onConfirm={executeRevoke}
            onCancel={() => !confirmLoading && setConfirmOpen(false)}
          />
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
